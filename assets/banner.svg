<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="55%" stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#6cc6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6cc6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3f7a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2a3f7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="none" stroke="#1a2133" stroke-width="2"/>

  <!-- galactic haze + core, echoing the app's own renderer -->
  <ellipse cx="905" cy="215" rx="330" ry="215" fill="url(#haze)"/>
  <circle cx="905" cy="215" r="120" fill="url(#core)"/>

  <!-- two logarithmic spiral arms, drawn as discrete stars like the real galaxy -->
  <g fill="#cfe4ff">
    <circle cx="963" cy="199" r="1.7" opacity="0.86"/><circle cx="983" cy="187" r="1.5" opacity="0.79"/>
    <circle cx="1001" cy="172" r="1.9" opacity="0.72"/><circle cx="1014" cy="153" r="1.4" opacity="0.66"/>
    <circle cx="1022" cy="132" r="2.1" opacity="0.75"/><circle cx="1024" cy="110" r="1.5" opacity="0.6"/>
    <circle cx="1019" cy="88" r="1.6" opacity="0.54"/><circle cx="1008" cy="69" r="1.3" opacity="0.48"/>
    <circle cx="991" cy="54" r="1.8" opacity="0.44"/><circle cx="969" cy="44" r="1.4" opacity="0.38"/>
    <circle cx="944" cy="39" r="1.5" opacity="0.34"/><circle cx="917" cy="40" r="1.3" opacity="0.3"/>
    <circle cx="847" cy="231" r="1.7" opacity="0.86"/><circle cx="827" cy="243" r="1.5" opacity="0.79"/>
    <circle cx="809" cy="258" r="1.9" opacity="0.72"/><circle cx="796" cy="277" r="1.4" opacity="0.66"/>
    <circle cx="788" cy="298" r="2.1" opacity="0.75"/><circle cx="786" cy="320" r="1.5" opacity="0.6"/>
    <circle cx="791" cy="342" r="1.6" opacity="0.54"/><circle cx="802" cy="361" r="1.3" opacity="0.48"/>
    <circle cx="819" cy="376" r="1.8" opacity="0.44"/><circle cx="841" cy="386" r="1.4" opacity="0.38"/>
    <circle cx="866" cy="391" r="1.5" opacity="0.34"/><circle cx="893" cy="390" r="1.3" opacity="0.3"/>
    <circle cx="1052" cy="215" r="1.2" opacity="0.4"/><circle cx="1078" cy="176" r="1.5" opacity="0.34"/>
    <circle cx="1090" cy="128" r="1.1" opacity="0.28"/><circle cx="758" cy="215" r="1.2" opacity="0.4"/>
    <circle cx="732" cy="254" r="1.5" opacity="0.34"/><circle cx="720" cy="302" r="1.1" opacity="0.28"/>
    <circle cx="1112" cy="243" r="1.0" opacity="0.24"/><circle cx="700" cy="176" r="1.0" opacity="0.24"/>
  </g>

  <!-- scattered field stars -->
  <g fill="#9fb2d4">
    <circle cx="132" cy="352" r="1.1" opacity="0.35"/><circle cx="196" cy="388" r="0.9" opacity="0.3"/>
    <circle cx="286" cy="366" r="1.2" opacity="0.28"/><circle cx="402" cy="392" r="0.9" opacity="0.26"/>
    <circle cx="520" cy="371" r="1.1" opacity="0.3"/><circle cx="612" cy="396" r="0.8" opacity="0.24"/>
    <circle cx="96" cy="66" r="1.0" opacity="0.28"/><circle cx="242" cy="44" r="0.9" opacity="0.24"/>
    <circle cx="470" cy="58" r="1.1" opacity="0.26"/><circle cx="586" cy="40" r="0.8" opacity="0.22"/>
  </g>

  <!-- eyebrow -->
  <g transform="translate(72,88)">
    <rect x="0" y="-11" width="26" height="2" fill="#6cc6ff"/>
    <text x="40" y="-5" fill="#6c7a94" font-size="13" letter-spacing="3.4">LOCAL-FIRST · OFFLINE · MIT</text>
  </g>

  <!-- headline -->
  <text x="72" y="176" fill="#e8edf7" font-size="55" font-weight="700" letter-spacing="-1.4">Long-term memory for</text>
  <text x="72" y="240" fill="#e8edf7" font-size="55" font-weight="700" letter-spacing="-1.4">
    <tspan fill="#6cc6ff">Claude Code</tspan><tspan fill="#e8edf7">.</tspan>
  </text>

  <text x="72" y="288" fill="#a4b0c8" font-size="17">Archive, search and reconstruct past sessions — then hand the</text>
  <text x="72" y="313" fill="#a4b0c8" font-size="17">context back. Explored as a galaxy, not a folder tree.</text>

  <!-- stat strip -->
  <g transform="translate(72,360)">
    <text x="0" y="0" fill="#e8edf7" font-size="19" font-weight="600">100k+</text>
    <text x="0" y="19" fill="#4a5570" font-size="11" letter-spacing="1.6">SESSIONS</text>

    <text x="132" y="0" fill="#e8edf7" font-size="19" font-weight="600">60 FPS</text>
    <text x="132" y="19" fill="#4a5570" font-size="11" letter-spacing="1.6">ONE DRAW CALL</text>

    <text x="284" y="0" fill="#e8edf7" font-size="19" font-weight="600">SQLite FTS5</text>
    <text x="284" y="19" fill="#4a5570" font-size="11" letter-spacing="1.6">FULL TEXT</text>

    <text x="452" y="0" fill="#e8edf7" font-size="19" font-weight="600">0</text>
    <text x="452" y="19" fill="#4a5570" font-size="11" letter-spacing="1.6">NETWORK CALLS</text>
  </g>

  <!-- wordmark -->
  <g transform="translate(1064,352)">
    <circle cx="0" cy="-6" r="7" fill="#6cc6ff" opacity="0.9"/>
    <circle cx="0" cy="-6" r="3" fill="#ffffff"/>
    <text x="18" y="0" fill="#e8edf7" font-size="21" font-weight="700" letter-spacing="2.6">ARTIX</text>
  </g>
</svg>
